name: Python Portfolio CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data analysis pipeline
        run: |
          cd project_data_analysis
          python data_analysis.py

      - name: Verify outputs generated
        run: |
          test -f project_data_analysis/clean_data.csv && echo "✅ clean_data.csv created"
          test -d project_data_analysis/output_charts && echo "✅ output_charts directory exists"
          ls project_data_analysis/output_charts/*.png | wc -l

      - name: Upload generated charts as artifact
        uses: actions/upload-artifact@v4
        with:
          name: output-charts
          path: project_data_analysis/output_charts/
          retention-days: 30
